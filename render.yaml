services:
  - type: web
    name: energy-predictor
    env: python
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r backend/requirements.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT backend.app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
